name: Deploy to nodo.host

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build producción
        run: npm run build

      - name: Configurar SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Agregar host conocido
        run: |
          mkdir -p ~/.ssh
          echo "76.13.106.71 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEm2hpb39YvO4Sf86T+3frKEMBet30okjXZYmfRrna0l" >> ~/.ssh/known_hosts

      - name: Instalar rsync
        run: sudo apt-get install -y rsync

      - name: Desplegar archivos al servidor
        run: |
          rsync -avz --delete \
            dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/symphony-shell-lubs/

      - name: Configurar ruta nginx en servidor
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'SSHEOF'
            set -e

            # Encontrar el archivo nginx que contiene la config de once-data-hub
            CONFIG=$(sudo grep -rl "once-data-hub" /etc/nginx/ 2>/dev/null | grep -v "\.bak\|\.swp" | head -1)
            echo "Archivo nginx detectado: $CONFIG"

            if [ -z "$CONFIG" ]; then
              echo "ERROR: No se encontró el archivo nginx con la configuración existente"
              exit 1
            fi

            # Si ya está configurado, no hacer nada
            if sudo grep -q "symphony-shell-lubs" "$CONFIG"; then
              echo "Ruta /symphony-shell-lubs/ ya existe en nginx — sin cambios"
            else
              echo "Agregando location /symphony-shell-lubs/ al nginx..."

              # Backup del config original
              sudo cp "$CONFIG" "${CONFIG}.bak.$(date +%Y%m%d%H%M%S)"

              # Insertar el nuevo location block antes del catch-all "location = /"
              sudo awk '
                /location = \// && !done {
                  print "    location /symphony-shell-lubs/ {"
                  print "        alias /var/www/symphony-shell-lubs/;"
                  print "        try_files $uri $uri/ /symphony-shell-lubs/index.html;"
                  print "    }"
                  print ""
                  done=1
                }
                { print }
              ' "$CONFIG" > /tmp/nginx_symphony.tmp

              sudo cp /tmp/nginx_symphony.tmp "$CONFIG"
              echo "Bloque de nginx agregado correctamente"
            fi

            # Verificar config y recargar nginx
            sudo nginx -t
            sudo nginx -s reload
            echo "Nginx recargado"
          SSHEOF

      - name: Verificar despliegue
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://nodo.host/symphony-shell-lubs/)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Despliegue exitoso en https://nodo.host/symphony-shell-lubs/"
          else
            echo "⚠️  Status $STATUS — revisar logs de nginx en el servidor"
            exit 1
          fi
