name: Deploy to nodo.host

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build producción
        run: npm run build

      - name: Configurar SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Agregar host conocido
        run: |
          mkdir -p ~/.ssh
          echo "76.13.106.71 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEm2hpb39YvO4Sf86T+3frKEMBet30okjXZYmfRrna0l" >> ~/.ssh/known_hosts

      - name: Instalar rsync
        run: sudo apt-get install -y rsync

      - name: Desplegar archivos al servidor
        run: |
          rsync -avz --delete \
            dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/symphony-shell-lubs/

      - name: Copiar y ejecutar script de nginx en servidor
        run: |
          scp .github/scripts/setup-nginx.sh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/setup-nginx.sh
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "chmod +x /tmp/setup-nginx.sh && bash /tmp/setup-nginx.sh"

      - name: Verificar despliegue
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://nodo.host/symphony-shell-lubs/)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Despliegue exitoso en https://nodo.host/symphony-shell-lubs/"
          else
            echo "⚠️  Status $STATUS — revisar logs de nginx"
            exit 1
          fi
